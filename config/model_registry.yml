models:
  - id: M00_METADATA
    tier: prerequisite
    question: Are source versions, fields, joins, effort metadata, herring dates, geometry, and counts usable?
    response: none
    design: metadata audit
    family: descriptive
    engine: data.table/sf
    status: implement_first

  - id: M01_RAW_TRAJECTORIES
    tier: descriptive
    question: What do unadjusted encounter, count, richness, and checklist-effort trajectories look like by event day and distance ring?
    response: detection/count/richness/effort
    design: event-day × non-overlapping ring summaries
    family: descriptive with cluster intervals
    engine: data.table
    status: core

  - id: M10_SPECIES_DETECTION_SURFACE
    tier: primary
    question: Does species encounter probability rise near spawn and decay with event day and distance?
    response: species detection
    design: checklist-level continuous event-time × distance surface
    family: binomial GAMM
    engine: mgcv or brms
    status: core

  - id: M11_SPECIES_PHASE_RING
    tier: primary
    question: Which discrete event phases and 1-km rings show the clearest response?
    response: species detection
    design: event-study bins × non-overlapping distance rings
    family: binomial GLMM/GAMM
    engine: glmmTMB or mgcv
    status: core

  - id: M12_ADDITIVE_SPAWN_KERNEL
    tier: primary
    question: Does additive exposure to all concurrent spawn events explain bird responses better than nearest-event assignment?
    response: species detection and guild outcomes
    design: summed spatial-temporal exposure kernels
    family: binomial/negative-binomial GAMM
    engine: mgcv or brms
    status: core

  - id: M13_SAME_LOCATION_EVENT_STUDY
    tier: supporting
    question: Do repeatedly sampled exact or generalized shoreline locations change through event time?
    response: detection/count
    design: location fixed effect or random slope event study
    family: binomial/hurdle mixed model
    engine: fixest/glmmTMB/brms
    status: supporting

  - id: M14_OBSERVER_CASE_CROSSOVER
    tier: supporting
    question: Do the same observers report more birds near spawn than on their own comparable checklists?
    response: detection/count
    design: observer-stratified case-crossover
    family: conditional logistic or fixed-effect count model
    engine: survival/fixest/glmmTMB
    status: supporting

  - id: M20_SPECIES_HURDLE_COUNT
    tier: primary
    question: Does spawn affect both the probability of encountering a species and its positive reported flock size?
    response: zero/nonzero plus positive numeric count
    design: two-part checklist model
    family: binomial + truncated negative binomial/lognormal
    engine: glmmTMB or brms
    status: core

  - id: M21_SPECIES_TWEEDIE_COUNT
    tier: supporting
    question: Is the unconditional reported count response detectable without splitting zeros and positives?
    response: numeric reported count including zeros
    design: checklist-level
    family: Tweedie mixed GAM
    engine: mgcv/glmmTMB
    status: supporting

  - id: M22_ROBUST_POSITIVE_COUNT
    tier: supporting
    question: Are positive-count effects robust to extreme flock estimates and heaping?
    response: log1p positive numeric count
    design: positive reports only
    family: Student-t or robust Gaussian mixed model
    engine: brms
    status: supporting

  - id: M23_AGGREGATION_EXCEEDANCE
    tier: primary
    question: Does spawn increase the probability of unusually large aggregations even when median counts change little?
    response: count exceeds species-specific pre-event 90th/95th/99th percentile
    design: checklist-level threshold event
    family: binomial mixed model / quantile GAM
    engine: mgcv/qgam/brms
    status: core

  - id: M30_GUILD_RESPONSES
    tier: primary
    question: Do mechanistic guilds show coherent changes in encounter, richness, and reported count?
    response: guild any-detection, richness, total reported count
    design: checklist-level event-time × distance
    family: binomial/Poisson-NB/hurdle GAMM
    engine: mgcv/glmmTMB/brms
    status: core

  - id: M31_HIERARCHICAL_SPECIES_GUILD
    tier: primary
    question: What are the guild mean responses and species deviations without forcing a common sign?
    response: species detection or compatible contrasts
    design: species-specific slopes nested in guild with species-specific nuisance and contextual effects
    family: multilevel Bernoulli/hurdle
    engine: brms/cmdstanr
    status: core_after_single_species

  - id: M32_COMMUNITY_GLLVM
    tier: supporting
    question: Does spawn reorganize the multivariate coastal bird assemblage?
    response: species detection/count matrix
    design: checklist community model with latent factors
    family: GLLVM/JSDM
    engine: gllvm/Hmsc/custom Stan
    status: supporting

  - id: M33_COMMUNITY_COMPOSITION
    tier: supporting
    question: Does community composition differ among event phases and distance rings?
    response: Jaccard/Bray-Curtis composition
    design: blocked ordination and permutation
    family: dbRDA/PERMANOVA
    engine: vegan
    status: supporting

  - id: M34_DIVERSITY_RICHNESS
    tier: supporting
    question: Do focal richness and Hill diversity increase near spawn?
    response: richness/Hill numbers
    design: checklist-level
    family: count or Gaussian mixed model
    engine: glmmTMB/mgcv
    status: supporting

  - id: M40_CALENDAR_MATCHED_DID
    tier: primary
    question: Do spawn-associated shorelines increase more than simultaneous no-recorded-active-spawn shorelines?
    response: species/guild detection and count
    design: calendar-matched difference-in-differences
    family: binomial/hurdle mixed model with event-date and location structure
    engine: fixest/glmmTMB/brms
    status: core

  - id: M41_RING_REDISTRIBUTION
    tier: primary
    question: Are increases inside 0–5 km accompanied by decreases in 5–25 or 25–50 km rings?
    response: standardized detection/count by ring
    design: event-date ring × phase difference-in-changes
    family: multilevel binomial/count model
    engine: brms/glmmTMB
    status: core

  - id: M42_REGIONAL_ALLOCATION
    tier: supporting
    question: Conditional on regional reported birds, does the share allocated near spawn increase?
    response: near-ring share of regional detections/counts
    design: event-date multinomial or beta-binomial allocation
    family: multinomial/beta-binomial mixed model
    engine: brms/cmdstanr
    status: supporting

  - id: M43_SAME_LOCATION_BACI
    tier: supporting
    question: At recurrent spawn locations, do spawn years differ from non-recorded-spawn years relative to matched locations?
    response: detection/count
    design: BACI-style location-year comparison
    family: difference-in-differences mixed model
    engine: fixest/glmmTMB/brms
    status: supporting_with_absence_caveat

  - id: M44_OBSERVER_VISITATION
    tier: bias_diagnostic
    question: Does observer allocation toward spawn shorelines change during event windows?
    response: observed shoreline submission allocation
    design: observer-day or event-date choice set
    family: conditional logit/multinomial
    engine: survival/brms
    status: separate_bias_model

  - id: M50_INTENSITY_DOSE_RESPONSE
    tier: primary
    question: Are bird responses stronger during larger or more extensive herring spawn events?
    response: species/guild detection/count
    design: event-time × distance modified by relative index, length, width, and method
    family: GAMM/hierarchical distributed-lag model
    engine: mgcv/brms
    status: core_on_comparable_components

  - id: M51_GEOMETRY_UNCERTAINTY
    tier: sensitivity
    question: Are results robust to event point, shoreline projection, location unit, and length-informed uncertainty kernels?
    response: compatible outputs from core models
    design: repeated exposure construction
    family: model ensemble sensitivity
    engine: targets
    status: required_sensitivity

  - id: M52_DATE_UNCERTAINTY
    tier: sensitivity
    question: Are results robust to start date, midpoint, full interval, and egg-availability decay?
    response: compatible outputs from core models
    design: multiple exposure realizations
    family: multiple-imputation/model-averaging sensitivity
    engine: targets/brms/mgcv
    status: required_sensitivity

  - id: M53_DISTRIBUTED_LAG
    tier: supporting
    question: What is the shape and duration of response after spawning begins?
    response: species/guild detection/count
    design: distributed lag over −60 to +90 days
    family: DLNM/GAMM
    engine: mgcv/dlnm
    status: supporting

  - id: M60_SILVER_WAVE
    tier: supporting
    question: Do bird responses track the northward progression of herring spawn?
    response: species/guild detection/count
    design: latitude × calendar × event-time model
    family: GAMM/hierarchical phenology model
    engine: mgcv/brms
    status: supporting

  - id: M70_DYNAMIC_OCCUPANCY
    tier: exploratory
    question: At repeatedly sampled shoreline sites, can occurrence and detection be separated over short replicated periods?
    response: repeated detection histories
    design: restricted repeated-site subset
    family: dynamic/multiseason occupancy
    engine: unmarked/spOccupancy/custom Stan
    status: only_if_closure_and_replication_pass

  - id: M71_NMIXTURE
    tier: exploratory
    question: Can repeated standardized site counts support latent relative-abundance inference?
    response: repeated numeric counts
    design: restricted repeated-site subset
    family: Poisson/ZIP N-mixture with identifiability checks
    engine: unmarked/custom likelihood
    status: not_default_only_after_simulation

  - id: M72_HETEROGENEITY_DISCOVERY
    tier: exploratory
    question: Which event, species, season, and spatial contexts predict stronger responses?
    response: residualized detection/count effect
    design: cross-fitted heterogeneous-effect discovery
    family: boosted trees/causal forest
    engine: grf/xgboost
    status: discovery_only

  - id: M80_PLACEBOS
    tier: validation
    question: Do date-shifted, location-shifted, future-event, and nonmechanistic outcomes produce similar signals?
    response: model-compatible placebo outcomes
    design: prespecified falsification suite
    family: same as target model
    engine: targets
    status: required

  - id: M81_PROSPECTIVE_HOLDOUT
    tier: confirmation
    question: Do frozen models predict new eBird releases and herring events from 2026 onward or an independent region?
    response: frozen primary outcomes
    design: prospective/external validation
    family: frozen model set
    engine: targets
    status: future_confirmation
