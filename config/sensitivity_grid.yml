  influence_treatments: [retain_all, event_cluster_robust, winsorized_diagnostic_only, top_count_leave_out]
  x_treatment: [detection_only, interval_censored_exploratory]

observer_adjustment:
  - prior_checklist_experience
  - observer_random_intercept
  - observer_fixed_effect_case_crossover
  - same_observer_same_calendar_sensitivity

validation:
  - leave_event_out
  - leave_year_out
  - leave_section_out
  - leave_observer_group_out
  - spatial_block
  - date_placebo
  - location_placebo
  - future_prospective_holdout
