project:
  name: herring-x-ebird-version-2
  display_name: "Herring x eBird Version 2"
  version: "0.1.0"
  random_seed: 1988
  outcome_gate: metadata_design_only

input_paths:
  ebird_ebd: "${HERRING_EBIRD_V2_EBD}"
  ebird_sed: "${HERRING_EBIRD_V2_SED}"
  herring_csv: "${HERRING_EBIRD_V2_HERRING}"
  shoreline_shp: "${HERRING_EBIRD_V2_SHORELINE}"
  sections_shp: "${HERRING_EBIRD_V2_SECTIONS}"

source_versions:
  ebird_release: EBD_relMay-2026
  herring_release: Pacific_herring_spawn_index_data_2025_EN.csv
  taxonomy: eBird Taxonomy v2025
  source_crs: 4326
  metric_crs: 3005

study_scope:
  geography: all_supportable_bc_herring_regions
  high_support_subset: Strait of Georgia
  source_years: [1988, 2025]
  candidate_periods:
    - [1988, 2025]
    - [2000, 2025]
    - [2010, 2025]
    - [2015, 2025]
  prospective_holdout_start_year: 2026

filters:
  complete_checklists_only: true
  allowed_protocols: [Stationary, Traveling]
  duration_minutes: [5, 300]
  traveling_distance_max_km: 5
  observers: [1, 10]
  shared_checklist_rule: deterministic_group_collapse_with_private_crosswalk

spatial_design:
  ring_breaks_km: [0, 0.5, 1, 2, 3, 4, 5, 10, 20]
  event_complex_rules:
    - {id: complex_1km_3d, distance_km: 1, interval_gap_days: 3}
    - {id: complex_2km_7d, distance_km: 2, interval_gap_days: 7}
    - {id: complex_5km_14d, distance_km: 5, interval_gap_days: 14}
  exposure_kernel_scales_km: [0.5, 1, 2, 3, 5, 10]
  geometry_representations: [source_point, conservative_extent, shoreline_linked, event_complex]

temporal_design:
  support_range_days: [-60, 90]
  event_date_representations: [start, end, midpoint, interval, jitter_ready]
  biological_kernels_days: [7, 14, 21, 28, 42]

analysis_policy:
  status: exploratory_estimand_refining_until_prospective_confirmation
  report_all_prespecified_models: true
  select_models_by_outcome: false
  additive_multi_event_exposure: true
  row_independent_duplicate_event_links: false
  missing_herring_component_is_zero: false
  relative_spawn_index_is_absolute_biomass: false
  bird_outcomes_authorized_in_setup: false
