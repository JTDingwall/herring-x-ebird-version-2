<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">Cross-region focal responses and Strait of Georgia specificity panel</title>
<desc id="desc">Coefficient plots with 95 percent confidence intervals show Surf Scoter and Short-billed Gull detection and conditional count estimates in both regions, plus Gadwall and Northern Shoveler Strait of Georgia detection estimates.</desc>
<rect width="1200" height="760" fill="#ffffff"/>
<style>.t{font-family:Arial,sans-serif;fill:#172c35}.h{font-size:25px;font-weight:700}.sh{font-size:19px;font-weight:700}.b{font-size:15px}.sm{font-size:13px}.ci{stroke-width:4}.sog{stroke:#1976a3;fill:#1976a3}.wcvi{stroke:#d97824;fill:#d97824}.spec{stroke:#8e4a70;fill:#8e4a70}.grid{stroke:#d8e0e3;stroke-width:1}.zero{stroke:#333;stroke-width:2;stroke-dasharray:6 5}</style>
<text class="t h" x="600" y="38" text-anchor="middle">Focal cross-region consistency and the broader SoG signal</text>
<text class="t sm" x="600" y="63" text-anchor="middle">Coefficients are log odds for detection or log positive count conditional on detection; bars are 95% CIs</text>
<g class="grid"><line x1="360" y1="105" x2="360" y2="680"/><line x1="434" y1="105" x2="434" y2="680" class="zero"/><line x1="619" y1="105" x2="619" y2="680"/><line x1="804" y1="105" x2="804" y2="680"/><line x1="989" y1="105" x2="989" y2="680"/><line x1="1100" y1="105" x2="1100" y2="680"/></g>
<g class="t sm" text-anchor="middle"><text x="360" y="713">-0.2</text><text x="434" y="713">0</text><text x="619" y="713">0.5</text><text x="804" y="713">1.0</text><text x="989" y="713">1.5</text><text x="1100" y="713">1.8</text></g><text class="t b" x="730" y="744" text-anchor="middle">Adjusted coefficient</text>
<text class="t sh" x="40" y="115">Detection</text>
<g class="t b"><text x="65" y="160">Surf Scoter — SoG</text><text x="65" y="205">Surf Scoter — WCVI</text><text x="65" y="250">Short-billed Gull — SoG</text><text x="65" y="295">Short-billed Gull — WCVI</text><text x="65" y="350">Gadwall — SoG specificity</text><text x="65" y="395">Northern Shoveler — SoG specificity</text></g>
<g class="ci"><line class="sog" x1="475" y1="155" x2="531" y2="155"/><circle class="sog" cx="503" cy="155" r="7"/><line class="wcvi" x1="687" y1="200" x2="901" y2="200"/><circle class="wcvi" cx="794" cy="200" r="7"/><line class="sog" x1="571" y1="245" x2="619" y2="245"/><circle class="sog" cx="595" cy="245" r="7"/><line class="wcvi" x1="709" y1="290" x2="925" y2="290"/><circle class="wcvi" cx="817" cy="290" r="7"/><line class="spec" x1="483" y1="345" x2="559" y2="345"/><rect class="spec" x="514" y="339" width="12" height="12"/><line class="spec" x1="629" y1="390" x2="704" y2="390"/><rect class="spec" x="660" y="384" width="12" height="12"/></g>
<line x1="45" y1="430" x2="1140" y2="430" stroke="#7f9299" stroke-width="1"/>
<text class="t sh" x="40" y="475">Conditional positive count</text>
<g class="t b"><text x="65" y="525">Surf Scoter — SoG</text><text x="65" y="570">Surf Scoter — WCVI</text><text x="65" y="615">Short-billed Gull — SoG</text><text x="65" y="660">Short-billed Gull — WCVI</text></g>
<g class="ci"><line class="sog" x1="589" y1="520" x2="676" y2="520"/><circle class="sog" cx="633" cy="520" r="7"/><line class="wcvi" x1="726" y1="565" x2="1009" y2="565"/><circle class="wcvi" cx="867" cy="565" r="7"/><line class="sog" x1="545" y1="610" x2="614" y2="610"/><circle class="sog" cx="579" cy="610" r="7"/><line class="wcvi" x1="800" y1="655" x2="1048" y2="655"/><circle class="wcvi" cx="924" cy="655" r="7"/></g>
<g class="t sm"><circle class="sog" cx="880" cy="95" r="6"/><text x="895" y="100">SoG focal</text><circle class="wcvi" cx="985" cy="95" r="6"/><text x="1000" y="100">WCVI focal</text><rect class="spec" x="1090" y="89" width="12" height="12"/><text x="1108" y="100">SoG specificity</text></g>
</svg>
