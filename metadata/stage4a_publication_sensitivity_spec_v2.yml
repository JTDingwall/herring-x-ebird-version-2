specification_version: stage4a_publication_sensitivity_spec_v2
status: PRE_EXECUTION_FROZEN_NO_PROTECTED_INPUT_READ
parent_main_commit: aea6cd7fb1a8b29059e4af2a6709cbf3a3756906
scope:
  years: [2005, 2025]
  primary_regions: [SoG, WCVI]
  units: all_8_frozen_primary_guilds
  outcomes: [detection, positive_numeric_count_given_detection]
  protected_rows_may_be_committed: false
  records_2026_plus: prohibited
tracked_contracts:
  stage4a_core_spec_v1:
    path: metadata/stage4a_core_spec_v1.yml
    sha256: 0c11db96e099802235212c3beeb7c27b4cfdea5702aaa383e6a4544da602a13a
  stage4a_model_specification_matrix_v1:
    path: metadata/stage4a_model_specification_matrix_v1.csv
    sha256: f7d0ab362ad8ef49a240d071b6beda4e3af62a442d8d36029535d7f2b85b4444
  species_primary_guild:
    path: metadata/species_primary_guild.csv
    sha256: 0dceaa6660a4e37e43b7dd4229b091c03618a3907261c2b36db7b12bdd8bd4a4
  canonical_guild_registry:
    path: metadata/canonical_guild_registry.csv
    sha256: 1808914ec9dde02a4b0af4f5f21353b103e733b82267fb42f3be2ce4e749c35f
matched_primary_contract:
  model_id: M01
  unit_class: guild
  checklist_population: registered_primary_region_frame
  independent_row: checklist
  detection:
    response: detection
    family: binomial
    link: logit
  positive_count:
    response: log_numeric_count
    cohort: finite_numeric_count_greater_than_zero
    family: gaussian_on_log_count
    interpretation: positive_numeric_count_given_detection
  fixed_predictors:
    - active_near
    - contemporaneous_reference
    - time_immediate_pre
    - time_spawn_start
    - time_early_egg
    - time_late_egg
    - time_post
    - distance_ring_0_0p5
    - distance_ring_0p5_1
    - distance_ring_1_2
    - distance_ring_2_3
    - distance_ring_3_4
    - distance_ring_4_5
    - distance_ring_5_10
    - factor_checklist_year
    - protocol
    - log_duration
    - log_effort_distance
    - observer_count
  random_intercepts: [event_block_token, observer_cluster_token, location_cluster_token]
  engine: mgcv_bam
  method: fREML
  discrete: true
  nthreads: 1
  simplified_glm_fallback: prohibited
  coefficient: active_near
  interval: normal_95_percent_from_model_standard_error
  validation: frozen_4_fold_event_blocked_fixed_factor_overlap_v2
placebo_contract:
  strata: [region, checklist_year]
  response_access_during_transformation: prohibited
  bundle_fields:
    - active_reference_class
    - active_near
    - contemporaneous_reference
    - concurrent_links
    - time_early_pre
    - time_immediate_pre
    - time_spawn_start
    - time_early_egg
    - time_late_egg
    - time_post
    - distance_ring_0_0p5
    - distance_ring_0p5_1
    - distance_ring_1_2
    - distance_ring_2_3
    - distance_ring_3_4
    - distance_ring_4_5
    - distance_ring_5_10
    - distance_ring_10_20
  M27_v2:
    transformation: nonzero_cyclic_bundle_shift_within_region_year
    order: analysis_event_token
    seed: 10007
    offset: 1_plus_seed_modulo_stratum_size_minus_one
  M28_v2:
    transformation: nonzero_cyclic_bundle_shift_within_region_year
    order: [location_cluster_token, analysis_event_token]
    seed: 20011
    offset: 1_plus_seed_modulo_stratum_size_minus_one
  invariants:
    - one_output_row_per_input_checklist
    - no_cross_region_or_cross_year_assignment
    - whole_bundle_rows_move_intact
    - distance_counts_sum_to_concurrent_links
    - time_counts_do_not_exceed_concurrent_links
    - marginal_bundle_distribution_preserved_within_each_stratum
    - no_outcome_field_read_to_construct_assignment
sensitivity_contracts:
  WCVI_2KM_v2:
    region: WCVI
    difference_from_M01: restrict_to_high_precision_2km_true
    all_other_model_choices: matched_exactly
  WCVI_DOMINANT_OBSERVER_v2:
    region: WCVI
    difference_from_M01: exclude_single_response_blind_dominant_observer_cluster
    dominance_population: all_eligible_WCVI_primary_frame_checklists_before_response_join
    dominance_metric: checklist_count
    tie_break: lexicographic_internal_token
    identifier_release: prohibited
    all_other_model_choices: matched_exactly
failure_rules:
  minimum_fit_rows: 20
  minimum_response_variation: 2
  missing_or_nonfinite_required_predictor: fail_model_component
  rank_deficiency: visible_warning
  bam_error: failed_numerical_fit_no_fallback
  nonconvergence: failed_convergence
  missing_active_near_coefficient: failed_geometry
  unsupported_factor_level_in_validation: exclude_with_explicit_count
  privacy_cell_below_20: suppress_measure
multiplicity:
  family: sensitivity_model_region_outcome
  method: BH_across_8_frozen_guilds
  all_prespecified_models_reported: true
M26:
  v1_status: RETIRED_FROM_INFERENTIAL_PUBLICATION_SET
  replacement: none
  rationale: released_v1_summary_does_not_estimate_a_registered_visitation_contrast
  publication_role: historical_method_limitation_only
artifacts:
  model_map: metadata/stage4a_publication_sensitivity_model_map_v2.csv
  output_schema: metadata/stage4a_publication_sensitivity_output_schema_v2.csv
  model_disposition: metadata/stage4a_publication_model_disposition_v2.csv
  output_directory: outputs/stage4a_publication_sensitivity_v2
  protected_checkpoint_directory: protected_environment_only_not_committed
execution_record_requirements:
  - pre_execution_spec_commit
  - execution_code_commit
  - tracked_input_hashes
  - protected_input_hashes_without_paths_or_rows
  - maximum_checklist_year_read
  - records_2026_plus_read
  - model_and_transformation_counts
  - convergence_and_failure_counts
  - output_hashes
final_gate: PASS_PUBLICATION_SENSITIVITY_V2_OR_EXPLICIT_COMPONENT_FAILURES
